name: Deploy to Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'          # ← sesuai Hostinger
          extensions: mbstring, pdo, pdo_mysql, zip, bcmath, intl

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Prepare .env
        run: |
          cp .env.example .env
          php artisan key:generate
          echo "APP_ENV=production" >> .env
          echo "APP_DEBUG=false" >> .env
          echo "APP_URL=https://rakiradigital.com" >> .env
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env

      - name: Deploy to CompanyProfile folder
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzr --delete
          path: ./
          remote_path: /home/u408052271/domains/rakiradigital.com/CompanyProfile
          remote_host: ${{ secrets.HOSTINGER_HOST }}
          remote_port: ${{ secrets.HOSTINGER_PORT }}
          remote_user: u408052271
          remote_key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}

      - name: Copy public content to public_html and fix index.php
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}
          username: u408052271
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          script: |
            rm -rf /home/u408052271/domains/rakiradigital.com/public_html/*
            cp -r /home/u408052271/domains/rakiradigital.com/CompanyProfile/public/* /home/u408052271/domains/rakiradigital.com/public_html/
            sed -i 's|__DIR__."/../bootstrap/app.php|__DIR__."/../CompanyProfile/bootstrap/app.php|g' /home/u408052271/domains/rakiradigital.com/public_html/index.php
            sed -i 's|__DIR__."/../vendor/autoload.php|__DIR__."/../CompanyProfile/vendor/autoload.php|g' /home/u408052271/domains/rakiradigital.com/public_html/index.php

      - name: Run migrations & cache
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}
          username: u408052271
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          script: |
            cd /home/u408052271/domains/rakiradigital.com/CompanyProfile
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache