name: Deploy to Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, zip, bcmath, intl

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Install NPM dependencies & build assets
        run: |
          npm install
          npm run build

      - name: Prepare .env
        run: |
          cp .env.example .env
          php artisan key:generate
          echo "APP_ENV=production" >> .env
          echo "APP_DEBUG=false" >> .env
          echo "APP_URL=https://rakiradigital.com" >> .env
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "GTM_ID=${{ secrets.GTM_ID }}" >> .env
          echo "GA4_ID=${{ secrets.GA4_ID }}" >> .env
          echo "RECAPTCHA_SITE_KEY=${{ secrets.RECAPTCHA_SITE_KEY }}" >> .env
          echo "RECAPTCHA_SECRET_KEY=${{ secrets.RECAPTCHA_SECRET_KEY }}" >> .env
          echo "DB_CONNECTION_POS=mysql_pos" >> .env
          echo "DB_HOST_POS=localhost" >> .env
          echo "DB_PORT_POS=3306" >> .env
          echo "DB_DATABASE_POS=${{ secrets.DB_POS_DATABASE }}" >> .env
          echo "DB_USERNAME_POS=${{ secrets.DB_POS_USERNAME }}" >> .env
          echo "DB_PASSWORD_POS=${{ secrets.DB_POS_PASSWORD }}" >> .env
          echo "DB_POS_HOST=localhost" >> .env
          echo "DB_POS_PORT=3306" >> .env
          echo "DB_POS_DATABASE=${{ secrets.DB_POS_DATABASE }}" >> .env
          echo "DB_POS_USERNAME=${{ secrets.DB_POS_USERNAME }}" >> .env
          echo "DB_POS_PASSWORD=${{ secrets.DB_POS_PASSWORD }}" >> .env
          echo "DB_WMS_HOST=localhost" >> .env
          echo "DB_WMS_PORT=3306" >> .env
          echo "DB_WMS_DATABASE=${{ secrets.DB_WMS_DATABASE }}" >> .env
          echo "DB_WMS_USERNAME=${{ secrets.DB_WMS_USERNAME }}" >> .env
          echo "DB_WMS_PASSWORD=${{ secrets.DB_WMS_PASSWORD }}" >> .env

      - name: Deploy to CompanyProfile folder
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzrc --exclude="storage/" --exclude="public/storage/" --exclude=".env" --exclude=".git/" --exclude="node_modules/"
          path: ./
          remote_path: /home/u408052271/domains/rakiradigital.com/CompanyProfile
          remote_host: ${{ secrets.HOSTINGER_HOST }}
          remote_port: ${{ secrets.HOSTINGER_PORT }}
          remote_user: u408052271
          remote_key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}

      - name: Copy public content, Run migrations & cache
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}
          username: u408052271
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          script: |
            rsync -ac --exclude="index.php" --exclude=".htaccess" /home/u408052271/domains/rakiradigital.com/CompanyProfile/public/ /home/u408052271/domains/rakiradigital.com/public_html/
            cd /home/u408052271/domains/rakiradigital.com/CompanyProfile
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache